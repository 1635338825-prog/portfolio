<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客服场景 RAG 智能客服</title>
  <meta name="description" content="可公开体验的客服场景 RAG 智能客服，支持知识检索、引用来源、风险识别和转人工策略。">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111822;
      --panel-2: #172231;
      --ink: #ecf4f1;
      --muted: rgba(236, 244, 241, .66);
      --line: rgba(236, 244, 241, .16);
      --accent: #52d68f;
      --cyan: #79c7ff;
      --amber: #f4b05f;
      --danger: #ff7a7a;
      --paper: #f7faf8;
      --paper-ink: #14201b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans SC", system-ui, sans-serif;
      background:
        linear-gradient(90deg, rgba(236, 244, 241, .045) 1px, transparent 1px) 0 0 / 44px 44px,
        linear-gradient(0deg, rgba(236, 244, 241, .04) 1px, transparent 1px) 0 0 / 44px 44px,
        radial-gradient(circle at 18% 12%, rgba(82, 214, 143, .22), transparent 30vw),
        radial-gradient(circle at 82% 8%, rgba(121, 199, 255, .18), transparent 26vw),
        var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(11, 15, 20, .72);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: #07120d;
      font-family: "Kanit", sans-serif;
      font-weight: 800;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      box-shadow: 0 12px 34px rgba(82, 214, 143, .28);
    }

    h1 {
      overflow: hidden;
      font-size: clamp(1rem, 2.2vw, 1.45rem);
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill-button {
      min-height: 40px;
      padding: 0 16px;
      color: var(--ink);
      font-size: .85rem;
      font-weight: 800;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(236, 244, 241, .06);
    }

    .pill-button.primary {
      color: #07120d;
      border-color: transparent;
      background: var(--accent);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 16px;
    }

    .chat-shell,
    .side-panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 24, 34, .84);
      box-shadow: 0 28px 90px rgba(0, 0, 0, .28);
      backdrop-filter: blur(18px);
    }

    .chat-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .status-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(236, 244, 241, .035);
    }

    .status-chip {
      padding: 6px 10px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(11, 15, 20, .32);
    }

    .status-chip strong {
      color: var(--ink);
    }

    .messages {
      min-height: 360px;
      overflow: auto;
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .msg {
      max-width: min(720px, 88%);
      padding: 13px 15px;
      border-radius: 8px;
      line-height: 1.72;
      white-space: pre-wrap;
    }

    .msg.user {
      justify-self: end;
      color: #07120d;
      background: var(--accent);
    }

    .msg.bot {
      justify-self: start;
      color: var(--paper-ink);
      background: var(--paper);
      border: 1px solid rgba(236, 244, 241, .28);
    }

    .msg.system {
      justify-self: center;
      max-width: 680px;
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
      border: 1px dashed var(--line);
      background: rgba(236, 244, 241, .045);
    }

    .answer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(20, 32, 27, .12);
    }

    .answer-meta span {
      padding: 3px 8px;
      color: #214233;
      font-size: .75rem;
      font-weight: 700;
      border-radius: 999px;
      background: rgba(82, 214, 143, .16);
    }

    .answer-meta .warn {
      color: #6c3200;
      background: rgba(244, 176, 95, .22);
    }

    .quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 14px 12px;
    }

    .quick-row button {
      min-height: 36px;
      padding: 0 12px;
      color: var(--ink);
      font-size: .82rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(236, 244, 241, .055);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(11, 15, 20, .52);
    }

    .composer input {
      min-width: 0;
      min-height: 46px;
      padding: 0 13px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: rgba(236, 244, 241, .07);
    }

    .composer input:focus {
      border-color: rgba(82, 214, 143, .72);
      box-shadow: 0 0 0 3px rgba(82, 214, 143, .14);
    }

    .send {
      min-height: 46px;
      color: #07120d;
      font-weight: 900;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
    }

    .side-panel {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      font-family: "Kanit", "Noto Sans SC", sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .panel-body {
      overflow: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric,
    .source-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(236, 244, 241, .05);
    }

    .metric {
      padding: 11px;
    }

    .metric b {
      display: block;
      color: var(--accent);
      font-family: "Kanit", sans-serif;
      font-size: 1.15rem;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: .76rem;
    }

    .source-card {
      padding: 12px;
      display: grid;
      gap: 7px;
    }

    .source-card h3 {
      font-size: .96rem;
      line-height: 1.35;
    }

    .source-card p {
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.58;
    }

    .source-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-card .tag {
      padding: 3px 7px;
      color: var(--ink);
      font-size: .7rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(11, 15, 20, .28);
    }

    .source-card.high {
      border-color: rgba(255, 122, 122, .42);
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 18px, 680px);
        padding: 9px 0;
      }

      .topbar {
        align-items: stretch;
        border-radius: 8px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .side-panel {
        min-height: 420px;
      }
    }

    @media (max-width: 620px) {
      .topbar,
      .top-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .brand {
        justify-content: center;
      }

      .pill-button,
      .pill-button.primary {
        width: 100%;
      }

      .messages {
        min-height: 320px;
        padding: 12px;
      }

      .msg {
        max-width: 96%;
      }

      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="brand" href="index.html#projects" aria-label="返回作品集项目列表">

      </aside>
    </section>
  </main>

  <script>
    const knowledgeBase = [
      {

        keywords: ["会员", "退款", "会员服务", "权益", "优惠券", "第三方", "购买后", "7天"],
        answer: "如果购买会员服务后没有使用任何会员权益，通常可在购买后 7 天内申请退款。若已经使用优惠券、专属折扣、增值服务或其他会员权益，需要人工客服结合订单判断。通过第三方渠道购买的会员，应回到原支付渠道申请退款。客服不能承诺一定退款、立即到账或额外赔偿。"

        risk: "中",
        updated: "2026-07-08",

      ["钱", ["退款", "扣款", "支付", "到账"]],
      ["开发票", ["发票", "抬头", "税号", "电子发票"]],
      ["没收到", ["签收", "物流", "快递", "派送"]],
      ["盗号", ["账号", "被盗", "登录异常", "身份核验"]],
      ["退", ["退款", "退货", "七天无理由", "售后"]],
      ["换", ["换货", "售后", "质量问题"]],
      ["赔", ["赔偿", "补偿", "投诉", "转人工"]]
    ]);

    const messages = document.querySelector("#messages");
    const form = document.querySelector("#askForm");
    const input = document.querySelector("#questionInput");
    const sourceList = document.querySelector("#sourceList");
    const confidenceMetric = document.querySelector("#confidenceMetric");
    const handoffMetric = document.querySelector("#handoffMetric");
    const domainMetric = document.querySelector("#domainMetric");
    const sourceMetric = document.querySelector("#sourceMetric");
    const resetBtn = document.querySelector("#resetBtn");
    let history = [];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function addMessage(role, html) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.innerHTML = html;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
      return el;
    }

    function expandQuestion(question) {
      const words = new Set([question]);
      const compact = question.replace(/\s+/g, "");
      words.add(compact);
      for (const [trigger, additions] of synonyms.entries()) {
        if (compact.includes(trigger)) {
          additions.forEach((item) => words.add(item));
        }
      }
      const last = history.at(-1);
      if (last && /多久|几天|什么时候|怎么处理|然后呢|那/.test(compact)) {
        last.sources.slice(0, 2).forEach((source) => {
          source.keywords.slice(0, 4).forEach((keyword) => words.add(keyword));
        });
      }
      return [...words];
    }

    function retrieve(question) {
      const expanded = expandQuestion(question);
      const compact = question.replace(/\s+/g, "");
      return knowledgeBase
        .map((item) => {
          let score = 0;
          const hits = [];
          item.keywords.forEach((keyword) => {
            if (compact.includes(keyword)) {
              score += keyword.length >= 3 ? 5 : 3;
              hits.push(keyword);
            }
          });
          expanded.forEach((word) => {
            if (word && item.keywords.some((keyword) => keyword.includes(word) || word.includes(keyword))) {
              score += 2;
              hits.push(word);
            }
          });
          if (compact.includes(item.domain)) score += 3;
          if (item.title.includes(compact)) score += 4;
          return {...item, score, hits: [...new Set(hits)]};
        })
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score || b.updated.localeCompare(a.updated))
        .slice(0, 4);
    }

    function shouldHandoff(question, sources) {
      const riskWords = /赔偿|补偿|投诉|举报|曝光|监管|律师|起诉|仲裁|法院|消费者协会|被盗|盗号|扣款|银行卡|验证码|支付密码|精神损失/;
      return riskWords.test(question) || sources.some((source) => source.risk === "高");
    }

    function buildAnswer(question) {
      let sources = retrieve(question);
      if (!sources.length) {
        sources = knowledgeBase
          .filter((item) => item.domain === "售后")
          .slice(0, 3)
          .map((item) => ({...item, score: 1, hits: []}));
      }
      const top = sources[0];
      const handoff = shouldHandoff(question, sources);
      const confidence = Math.min(96, Math.max(42, Math.round((top.score / 18) * 100)));
      const sourceText = sources.slice(0, 2).map((source, index) => `${index + 1}. ${source.answer}`).join("\n\n");
      const guardrail = handoff
        ? "\n\n该问题涉及高风险或需人工核验的信息，我会建议转人工处理，并避免承诺赔偿、退款结果或泄露隐私信息。"
        : "";
      const answer = `${sourceText}${guardrail}\n\n引用来源：${sources.slice(0, 3).map((source) => source.title).join("；")}`;
      return {answer, sources, handoff, confidence, domain: top.domain};
    }

    function renderTrace(result) {
      confidenceMetric.textContent = `${result.confidence}%`;
      handoffMetric.textContent = result.handoff ? "建议" : "否";
      domainMetric.textContent = result.domain;
      sourceMetric.textContent = String(result.sources.length);
      sourceList.innerHTML = result.sources.map((source) => `
        <article class="source-card ${source.risk === "高" ? "high" : ""}">
          <h3>${escapeHtml(source.title)}</h3>
          <p>${escapeHtml(source.answer)}</p>
          <div class="tags">
            <span class="tag">${escapeHtml(source.domain)}</span>
            <span class="tag">风险：${escapeHtml(source.risk)}</span>
            <span class="tag">${escapeHtml(source.updated)}</span>
            ${source.hits.slice(0, 3).map((hit) => `<span class="tag">命中：${escapeHtml(hit)}</span>`).join("")}
          </div>
        </article>
      `).join("");
    }

    function ask(question) {
      const clean = question.trim();
      if (!clean) return;
      addMessage("user", escapeHtml(clean));
      const pending = addMessage("bot", "正在检索知识库...");
      const result = buildAnswer(clean);
      history.push({question: clean, sources: result.sources});
      history = history.slice(-6);
      pending.innerHTML = `${escapeHtml(result.answer)}
        <div class="answer-meta">
          <span>置信度 ${result.confidence}%</span>
          <span>命中 ${result.sources.length} 条知识</span>
          <span class="${result.handoff ? "warn" : ""}">${result.handoff ? "建议转人工" : "可直接答复"}</span>
        </div>`;
      renderTrace(result);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const question = input.value;
      input.value = "";
      ask(question);
      input.focus();
    });

    document.querySelectorAll("[data-question]").forEach((button) => {
      button.addEventListener("click", () => ask(button.dataset.question));
    });

    resetBtn.addEventListener("click", () => {
      history = [];
      messages.innerHTML = '<div class="msg system">会话已清空。可以重新咨询退款、发票、物流、订单、账号安全、支付扣款和退换货问题。</div>';
      confidenceMetric.textContent = "--";
      handoffMetric.textContent = "--";
      domainMetric.textContent = "--";
      sourceMetric.textContent = "--";
      sourceList.innerHTML = "";
      input.focus();
    });

    input.focus();
  </script>
</body>
</html>
